<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STIG Expert Critic Export</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232636;
  --border: #2e3247;
  --text: #e1e4ed;
  --muted: #8b8fa7;
  --accent: #6c8cff;
  --accent-hover: #8ba3ff;
  --green: #4caf7d;
  --red: #e05252;
  --orange: #e09c52;
  --yellow: #fbbf24;
  --radius: 8px;
  --mono: "Consolas", "Cascadia Code", monospace;
  --sans: "Segoe UI", system-ui, -apple-system, sans-serif;
  --shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
button, input, select, textarea { font: inherit; }
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}
header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.header-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 700;
}
.badge-gate {
  background: #3b3f53;
  color: var(--text);
  cursor: pointer;
}
.badge-gate.healthy { background: rgba(76,175,125,0.16); color: var(--green); }
.badge-gate.advisory_only { background: rgba(251,191,36,0.14); color: var(--yellow); }
.badge-gate.unreachable,
.badge-gate.tampered { background: rgba(224,82,82,0.16); color: var(--red); }
.session-bar { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
.session-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
.session-dot.ok { background: var(--green); }

.layout { display: grid; grid-template-columns: 290px 1fr; min-height: calc(100vh - 49px); }
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.main { display: flex; flex-direction: column; min-width: 0; }
.divider { border-top: 1px solid var(--border); margin: 4px 0; }
label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
input[type="text"], input[type="password"], select, textarea {
  width: 100%;
  padding: 8px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  outline: none;
}
textarea {
  min-height: 130px;
  resize: vertical;
  font-family: var(--mono);
  font-size: 12px;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
.btn {
  padding: 7px 13px;
  border: none;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s ease, opacity 0.15s ease;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover:not(:disabled) { background: #5cc88f; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover:not(:disabled) { background: #ea7171; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-orange:hover:not(:disabled) { background: #ebb07b; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-full { width: 100%; justify-content: center; }

.conn-status {
  padding: 6px 10px;
  border-radius: var(--radius);
  text-align: center;
  font-size: 11px;
  font-weight: 700;
}
.conn-status.on { background: rgba(76,175,125,0.12); color: var(--green); }
.conn-status.off { background: rgba(139,143,167,0.06); color: var(--muted); }

.stig-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
}
.stig-item {
  padding: 6px 9px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.stig-item:hover { background: rgba(108,140,255,0.08); }
.stig-item.selected { background: rgba(108,140,255,0.15); }
.stig-meta { min-width: 0; }
.stig-meta .vid { font-family: var(--mono); font-weight: 700; font-size: 11px; }
.stig-meta .title {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 185px;
}
.vstatus {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
}
.vstatus.not_a_finding { background: rgba(76,175,125,0.15); color: var(--green); }
.vstatus.open { background: rgba(224,82,82,0.15); color: var(--red); }
.vstatus.insufficient_evidence,
.vstatus.unresolved { background: rgba(251,191,36,0.15); color: var(--orange); }

.contract-banner {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 46px;
}
.cb-vid { font-family: var(--mono); font-weight: 700; font-size: 13px; color: var(--accent); }
.cb-title {
  font-size: 12px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cb-status .status-chip {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
}
.status-chip.not_a_finding { background: rgba(76,175,125,0.15); color: var(--green); }
.status-chip.open { background: rgba(224,82,82,0.15); color: var(--red); }
.status-chip.insufficient_evidence,
.status-chip.unresolved { background: rgba(251,191,36,0.15); color: var(--orange); }

.tab-bar {
  display: flex;
  gap: 4px;
  align-items: center;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 14px;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 14px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-vid {
  margin-left: auto;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
}

.tab-panel {
  display: none;
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}
.tab-panel.active { display: flex; flex-direction: column; gap: 14px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.card-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.card-header h3 { font-size: 13px; font-weight: 700; }
.card-body { padding: 14px; }
.detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 12px; }
.detail-grid .full { grid-column: 1 / -1; }
.detail-value { font-size: 12px; color: var(--text); }
.mono { font-family: var(--mono); }
.muted { color: var(--muted); }
.placeholder { color: var(--muted); padding: 28px 0; text-align: center; font-size: 13px; }
.hidden { display: none !important; }

.status-msg {
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
}
.status-msg.ok { background: rgba(76,175,125,0.12); color: var(--green); border: 1px solid rgba(76,175,125,0.25); }
.status-msg.fail { background: rgba(224,82,82,0.12); color: var(--red); border: 1px solid rgba(224,82,82,0.25); }

.console-box, .log {
  background: #111318;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--muted);
}
.console-box { max-height: 240px; overflow-y: auto; }

.validate-action-bar {
  position: sticky;
  top: -16px;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 14px;
  margin: -14px -14px 10px -14px;
  background: linear-gradient(180deg, rgba(26,29,39,0.98) 0%, rgba(26,29,39,0.95) 100%);
  border-bottom: 1px solid var(--border);
}
.validate-provenance {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: rgba(108,140,255,0.07);
  padding: 10px 12px;
}
.provenance-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 8px 12px;
  font-size: 12px;
}
.provenance-item .label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--muted);
}
.provenance-item .value {
  display: block;
  font-family: var(--mono);
  word-break: break-word;
}

table { width: 100%; border-collapse: collapse; font-size: 12px; }
th {
  text-align: left;
  padding: 6px 8px;
  background: var(--surface2);
  color: var(--muted);
  font-weight: 700;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
td {
  padding: 6px 8px;
  border-top: 1px solid var(--border);
  vertical-align: top;
}
tr.pass td { background: rgba(76,175,125,0.05); }
tr.fail td { background: rgba(224,82,82,0.05); }
tr.unresolved td { background: rgba(251,191,36,0.05); }

.pullback-summary {
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  background: rgba(251,191,36,0.06);
  border: 1px solid rgba(251,191,36,0.15);
  border-radius: 6px;
}
.pullback-summary .pb-label { font-weight: 700; color: var(--yellow); }
.pullback-summary .pb-crit { color: var(--red); font-size: 11px; margin-top: 4px; }

.adj-outcome-banner {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  padding: 12px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
}
.adj-outcome-banner.outcome-pass { border-color: rgba(76,175,125,0.35); background: rgba(76,175,125,0.04); }
.adj-outcome-banner.outcome-fail { border-color: rgba(224,82,82,0.35); background: rgba(224,82,82,0.04); }
.adj-outcome-banner.outcome-unknown { border-color: rgba(224,156,82,0.35); background: rgba(224,156,82,0.04); }
.adj-outcome-left { display: flex; align-items: center; gap: 12px; }
.adj-outcome-meta { display: flex; flex-direction: column; gap: 2px; }
.adj-badge-large {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.adj-badge-large.not_a_finding { background: rgba(76,175,125,0.15); color: var(--green); }
.adj-badge-large.open { background: rgba(224,82,82,0.15); color: var(--red); }
.adj-badge-large.insufficient_evidence,
.adj-badge-large.unresolved { background: rgba(224,156,82,0.15); color: var(--orange); }
.adj-ev-counts { display: flex; gap: 10px; font-size: 11px; font-weight: 700; }
.ec-pass { color: var(--green); }
.ec-fail { color: var(--red); }
.ec-unresolved { color: var(--orange); }

.adj-fiber-header:hover { background: rgba(251,191,36,0.04); }
.proof-chain { list-style: none; padding: 0; margin: 0; }
.proof-phase-label {
  padding: 7px 12px 3px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.proof-step {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 8px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
}
.proof-step .ps-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
}
.proof-step .ps-icon.ic-observe,
.proof-step .ps-icon.ic-evidence { background: rgba(108,140,255,0.12); color: var(--accent); }
.proof-step .ps-icon.ic-pullback { background: rgba(251,191,36,0.15); color: var(--yellow); }
.proof-step .ps-icon.ic-criteria { background: rgba(76,175,125,0.15); color: var(--green); }
.proof-step .ps-icon.fail,
.proof-step .ps-icon.ic-criteria.fail { background: rgba(224,82,82,0.15); color: var(--red); }
.proof-step .ps-icon.unresolved { background: rgba(224,156,82,0.15); color: var(--orange); }
.ps-title { font-weight: 700; font-size: 12px; margin-bottom: 2px; }
.ps-detail { color: var(--muted); font-size: 11px; }
.ps-verdict {
  display: inline-block;
  margin-top: 5px;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
}
.ps-verdict.pass { background: rgba(76,175,125,0.15); color: var(--green); }
.ps-verdict.fail { background: rgba(224,82,82,0.15); color: var(--red); }
.ps-verdict.unresolved { background: rgba(224,156,82,0.15); color: var(--orange); }

.stepper { display: flex; }
.stepper .step {
  flex: 1;
  text-align: center;
  padding: 7px 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  border-bottom: 3px solid var(--border);
}
.stepper .step.active { color: var(--accent); border-color: var(--accent); }
.stepper .step.done { color: var(--green); border-color: var(--green); }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
  .detail-grid { grid-template-columns: 1fr; }
  .validate-action-bar { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>
<header>
  <div class="header-meta">
    <h1>STIG Expert Critic</h1>
    <span class="badge">Factory Export</span>
    <span id="gateBadge" class="badge badge-gate" title="Coalgebra gate status" onclick="showGateDetail()">gate: checking</span>
  </div>
  <div class="session-bar">
    <span id="sessDot" class="session-dot"></span>
    <span id="sessLabel">Not connected</span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div>
      <label>Machine</label>
      <select id="host"></select>
    </div>
    <div>
      <label>Username</label>
      <input id="user" type="text" autocomplete="username" value="admin">
    </div>
    <div>
      <label>Password</label>
      <input id="pass" type="password" autocomplete="current-password">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="connect">Connect</button>
      <button class="btn btn-ghost" id="disconnect">Disconnect</button>
    </div>
    <div id="conn" class="conn-status off">Disconnected</div>
    <div class="divider"></div>
    <div style="display:flex;flex-direction:column;flex:1;min-height:0;gap:6px">
      <label>STIG Controls</label>
      <input id="filter" type="text" placeholder="Search V-ID or title">
      <div id="stig-list" class="stig-list"></div>
    </div>
  </aside>

  <div class="main">
    <div class="contract-banner">
      <span id="pin" class="cb-vid">No V-ID selected</span>
      <span id="title" class="cb-title">Select a vulnerability</span>
      <span id="status" class="cb-status"></span>
    </div>

    <div class="tab-bar" id="tabs"></div>

    <section id="contract" class="tab-panel active"></section>
    <section id="validate" class="tab-panel"></section>
    <section id="adjudication" class="tab-panel"></section>
    <section id="remediate" class="tab-panel"></section>
    <section id="local-repair" class="tab-panel"></section>
    <section id="tmsh-query" class="tab-panel"></section>
    <section id="rest-query" class="tab-panel"></section>
    <section id="merge" class="tab-panel"></section>
  </div>
</div>

<script>
"use strict";
const tabs = ["contract", "validate", "adjudication", "remediate", "local-repair", "tmsh-query", "rest-query", "merge"];
const initialState = {
  appMode: "booting",
  connection: { hostId: null, username: "", connected: false, sessionLabel: "" },
  gate: { status: "checking", summary: "checking", detailLines: [], allowValidate: false, allowAdvice: false, allowResidualCapture: false, allowExecution: false, allowPromotion: false },
  selection: { currentVid: null, currentTab: "contract" },
  caches: { contractsByVid: {}, latestValidationByVid: {}, latestAdjudicationByVid: {}, latestRemediationByVid: {}, latestLocalRepairByVid: {}, vulnStatusByVid: {} },
  merge: { snippet: "", step: "edit", verifyResult: null, mergeResult: null, saveResult: null },
  query: { tmsh: { input: "", output: null, status: "idle" }, rest: { input: "", output: null, status: "idle" } },
  ui: { showFiberTable: false }
};
let state = structuredClone(initialState);
const $ = (id) => document.getElementById(id);
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]));

function bundleMatches(bundle) {
  return bundle && bundle.hostId === state.connection.hostId && bundle.vid === state.selection.currentVid;
}

function gateAllows(action) {
  const g = state.gate;
  if (action === "validate") return !!g.allowValidate;
  if (action === "advice") return !!g.allowAdvice;
  if (action === "residual") return !!g.allowResidualCapture;
  if (action === "execute") return !!g.allowExecution;
  return false;
}

function resetHostScopedTruth(hostId) {
  state.connection.hostId = hostId;
  state.connection.connected = false;
  state.connection.sessionLabel = "";
  state.caches.latestValidationByVid = {};
  state.caches.latestAdjudicationByVid = {};
  state.caches.latestRemediationByVid = {};
  state.caches.latestLocalRepairByVid = {};
  state.caches.vulnStatusByVid = {};
  state.merge = { snippet: "", step: "edit", verifyResult: null, mergeResult: null, saveResult: null };
  state.query = { tmsh: { input: "", output: null, status: "idle" }, rest: { input: "", output: null, status: "idle" } };
  state.ui.showFiberTable = false;
}

function statusClass(status) {
  return ["not_a_finding", "open", "insufficient_evidence", "unresolved"].includes(status) ? status : "unresolved";
}

function statusLabel(status) {
  return String(status || "unresolved").replaceAll("_", " ");
}

function verdictToSymbol(verdict) {
  if (verdict === "pass") return "OK";
  if (verdict === "fail") return "!";
  return "?";
}

function proofPhaseLabel(phase) {
  if (phase === "observe") return "Observe";
  if (phase === "pullback") return "Pullback";
  if (phase === "criteria") return "Criteria";
  return "Phase";
}

function proofIconClass(phase, verdict) {
  const suffix = verdict === "pass" ? "" : ` ${verdict}`;
  if (phase === "observe") return `ps-icon ic-observe${suffix}`;
  if (phase === "pullback") return `ps-icon ic-pullback${suffix}`;
  if (phase === "criteria") return `ps-icon ic-criteria${suffix}`;
  return `ps-icon ic-evidence${suffix}`;
}

function dispatch(ev) {
  if (ev.type === "GATE_REFRESHED") {
    const permissions = ev.bundle.permissions || {};
    state.gate = {
      status: ev.bundle.status,
      summary: ev.bundle.summary,
      detailLines: ev.bundle.detailLines || [],
      allowValidate: !!permissions.allowValidate,
      allowAdvice: !!permissions.allowAdvice,
      allowResidualCapture: !!permissions.allowResidualCapture,
      allowExecution: !!permissions.allowExecution,
      allowPromotion: !!permissions.allowPromotion
    };
  } else if (ev.type === "HOST_SELECTED") {
    resetHostScopedTruth(ev.hostId);
  } else if (ev.type === "CONTRACTS_LOADED") {
    state.caches.contractsByVid = Object.fromEntries(ev.bundles.map((bundle) => [bundle.vid, bundle]));
  } else if (ev.type === "VID_SELECTED") {
    state.selection.currentVid = ev.vid;
    state.selection.currentTab = "contract";
    state.ui.showFiberTable = false;
  } else if (ev.type === "TAB_SELECTED") {
    state.selection.currentTab = ev.tab;
  } else if (ev.type === "CONNECTED") {
    state.connection.connected = true;
    state.connection.sessionLabel = ev.sessionLabel;
    state.connection.username = $("user").value;
  } else if (ev.type === "DISCONNECTED") {
    state.connection.connected = false;
    state.connection.sessionLabel = "";
  } else if (ev.type === "VALIDATION_RECEIVED") {
    if (!bundleMatches(ev.validation)) return;
    state.caches.latestValidationByVid[ev.validation.vid] = ev.validation;
    state.caches.latestAdjudicationByVid[ev.adjudication.vid] = ev.adjudication;
    if (ev.remediation) state.caches.latestRemediationByVid[ev.remediation.vid] = ev.remediation;
    state.caches.vulnStatusByVid[ev.validation.vid] = ev.validation.status;
  } else if (ev.type === "LOCAL_REPAIR_RECEIVED") {
    if (bundleMatches(ev.bundle)) state.caches.latestLocalRepairByVid[ev.bundle.vid] = ev.bundle;
  } else if (ev.type === "SNIPPET_CHANGED") {
    state.merge.snippet = ev.snippet;
    state.merge.step = "edit";
    state.merge.verifyResult = null;
    state.merge.mergeResult = null;
    state.merge.saveResult = null;
  } else if (ev.type === "VERIFY_DONE") {
    state.merge.verifyResult = ev.result;
    state.merge.step = ev.result.outcome === "ok" ? "verified" : "edit";
  } else if (ev.type === "MERGE_DONE") {
    state.merge.mergeResult = ev.result;
    if (ev.result.outcome === "ok") state.merge.step = "merged";
  } else if (ev.type === "SAVE_DONE") {
    state.merge.saveResult = ev.result;
    if (ev.result.outcome === "ok") state.merge.step = "saved";
  } else if (ev.type === "FIBER_TABLE_TOGGLED") {
    state.ui.showFiberTable = !state.ui.showFiberTable;
  }
  render();
}

async function getJson(url) {
  const response = await fetch(url);
  return await response.json();
}

async function postJson(url, body) {
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  return await response.json();
}

function renderProofChain(proofChain) {
  let previousPhase = "";
  const chunks = [];
  (proofChain || []).forEach((step) => {
    if (step.phase !== previousPhase) {
      chunks.push(`<div class="proof-phase-label">${esc(proofPhaseLabel(step.phase))}</div>`);
      previousPhase = step.phase;
    }
    chunks.push(`
      <div class="proof-step">
        <div class="${esc(proofIconClass(step.phase, step.verdict))}">${esc(verdictToSymbol(step.verdict))}</div>
        <div>
          <div class="ps-title">${esc(step.title || proofPhaseLabel(step.phase))}</div>
          <div class="ps-detail">${esc(step.detail || "")}</div>
          <span class="ps-verdict ${esc(step.verdict || "unresolved")}">${esc(step.verdict || "unresolved")}</span>
        </div>
      </div>
    `);
  });
  return `<div class="proof-chain">${chunks.join("")}</div>`;
}

function mergeStepClass(stepName) {
  const order = ["edit", "verified", "merged", "saved"];
  const currentIndex = order.indexOf(state.merge.step);
  const thisIndex = order.indexOf(stepName);
  if (thisIndex < currentIndex) return "done";
  if (thisIndex === currentIndex) return "active";
  return "";
}

  if (!result) return `<div class="console-box">No result yet.</div>`;
  return `<div class="console-box">${esc(result.consoleText || "")}</div>`;

function assertVid() {
  if (!state.selection.currentVid) {
    alert("Select a V-ID first.");
    return false;
  }
  return true;
}

async function doValidate() {
  if (!assertVid() || !state.connection.connected || !gateAllows("validate")) {
    alert("Validate requires host, V-ID, and gate permission.");
    return;
  }
  const vid = state.selection.currentVid;
  const host = state.connection.hostId;
  const data = await postJson("/api/validate", { vid });
  if (data.ok && state.connection.hostId === host && state.selection.currentVid === vid) {
    dispatch({ type: "VALIDATION_RECEIVED", validation: data.validation, adjudication: data.adjudication, remediation: data.remediation });
  } else {
    alert(data.error || "Validation failed");
  }
}

async function captureResidual(rows, validation) {
  if (!rows.length || !gateAllows("residual")) return;
  const data = await postJson("/api/residuals/capture", {
    vid: state.selection.currentVid,
    rows,
    sourceValidationBundleId: validation.bundleId
  });
  if (data.ok) dispatch({ type: "LOCAL_REPAIR_RECEIVED", bundle: data.bundle });
  else alert(data.error || "Residual capture failed");
}

async function doVerify() {
  const data = await postJson("/api/verify_merge", { config: state.merge.snippet });
  dispatch({ type: "VERIFY_DONE", result: { outcome: data.ok ? "ok" : "fail", consoleText: data.output || data.error || "" } });
}

async function doMerge() {
  if (state.merge.step !== "verified") return;
  const data = await postJson("/api/apply_merge", { config: state.merge.snippet });
  dispatch({ type: "MERGE_DONE", result: { outcome: data.ok ? "ok" : "fail", consoleText: data.output || data.error || "" } });
}

async function doSave() {
  if (state.merge.step !== "merged") return;
  const data = await postJson("/api/save_config", {});
  dispatch({ type: "SAVE_DONE", result: { outcome: data.ok ? "ok" : "fail", consoleText: data.output || data.error || "" } });
}

function toggleFiberTable() {
  dispatch({ type: "FIBER_TABLE_TOGGLED" });
}

function showGateDetail() {
  const lines = [state.gate.summary].concat(state.gate.detailLines || []);

}

async function boot() {
  const hosts = await getJson("/api/hosts");
  $("host").innerHTML = hosts.map((host) => `<option value="${esc(host.host)}">${esc(host.label)}</option>`).join("");
  $("host").onchange = (event) => dispatch({ type: "HOST_SELECTED", hostId: event.target.value });
  $("filter").oninput = render;
  dispatch({ type: "HOST_SELECTED", hostId: $("host").value });
  $("connect").onclick = async () => {
    const data = await postJson("/api/connect", {
      host: $("host").value,
      username: $("user").value,
      password: $("pass").value
    });
    if (data.ok) {
      dispatch({ type: "CONNECTED", sessionLabel: data.sessionLabel });
      dispatch({ type: "GATE_REFRESHED", bundle: data.gate });
    } else {
      alert(data.error || "connect failed");
    }
  };
  $("disconnect").onclick = async () => {
    await postJson("/api/disconnect", {});
    dispatch({ type: "DISCONNECTED" });
  };
  dispatch({ type: "GATE_REFRESHED", bundle: await getJson("/api/gate_snapshot") });
  dispatch({ type: "CONTRACTS_LOADED", bundles: await getJson(`/api/contracts?host=${encodeURIComponent(state.connection.hostId || "")}`) });
}

boot().catch((error) => {
  document.body.innerHTML = `<pre class="console-box">${esc(error.stack || error)}</pre>`;
});
</script>
</body>
</html>
